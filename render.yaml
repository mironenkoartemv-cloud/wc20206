services:
  - type: web
    name: chexx-wc2026-predictor
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: WORLD_CUP_API_BASE
        value: https://worldcup26.ir
      - key: DATABASE_URL
        fromDatabase:
          name: chexx-wc2026-db
          property: connectionString
      - key: ADMIN_TOKEN
        sync: false

databases:
  - name: chexx-wc2026-db
    plan: basic-256mb
    databaseName: chexx_wc2026
    user: chexx_wc2026
    ipAllowList: []
